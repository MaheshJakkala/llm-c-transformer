<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #1D9E75;"></span>C INT8-AVX2 ⭐</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #378ADD;"></span>GPU T4</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #639922;"></span>GPU A100</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #E24B4A;"></span>PyTorch CPU</span>
</div>
<div style="position: relative; width: 100%; height: 350px;">
  <canvas id="perfDollarChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('perfDollarChart'), {
  type: 'bar',
  data: {
    labels: ['C INT8-AVX2', 'GPU T4', 'GPU A100', 'PyTorch CPU'],
    datasets: [{
      label: 'Performance per Dollar',
      data: [18.2, 10.0, 5.0, 2.1],
      backgroundColor: ['#1D9E75', '#378ADD', '#639922', '#E24B4A']
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      title: {
        display: true,
        text: 'Performance per Dollar (Higher is Better)',
        font: { size: 16, weight: '500' },
        padding: { bottom: 20 }
      },
      tooltip: {
        callbacks: {
          label: function(context) {
            const efficiency = context.dataIndex === 0 ? ' (8.7× better than GPUs)' : '';
            return context.parsed.y.toFixed(1) + ' tok/s per $1/day' + efficiency;
          }
        }
      }
    },
    scales: {
      x: {
        title: { display: true, text: 'System', font: { size: 13 } }
      },
      y: {
        title: { display: true, text: 'Tokens/sec per $1/day', font: { size: 13 } },
        beginAtZero: true,
        max: 20
      }
    }
  }
});
</script>
